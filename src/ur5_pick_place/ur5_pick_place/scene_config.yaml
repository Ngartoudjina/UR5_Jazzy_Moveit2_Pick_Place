scene:
  table:
    id: "table"
    frame_id: "world"
    size: { x: 0.8, y: 0.8, z: 0.05 }
    position: { x: 0.65, y: 0.0, z: -0.025 }

  pick_object:
    id: "box_object"
    frame_id: "world"
    size: { x: 0.05, y: 0.05, z: 0.10 }
    position: { x: 0.5, y: 0.1, z: 0.05 }

  place_target:
    frame_id: "world"
    position: { x: 0.5, y: -0.3, z: 0.05 }

pick_place:
  # Action servers
  arm_action:     /ur5_arm_controller/follow_joint_trajectory
  gripper_action: /hand_controller/gripper_cmd

  # Timing
  move_duration:   3.0
  approach_height: 0.15
  lift_height:     0.25

  # Gripper
  gripper_open:   0.0    # rad — doigts ouverts
  gripper_closed: 0.7    # rad — saisie ferme

  # MoveIt2
  planning_group:    "ur5_arm"
  planning_attempts: 10
  planning_time:     5.0

  # Poses joints [pan, lift, elbow, wrist1, wrist2, wrist3] en radians
  # UNE seule source de vérité — home_joints supprimé (doublon incohérent)
  poses:
    HOME:           [ 0.0,  -0.1041,  1.4232,  0.2430,  4.6863,  1.6315]
    APPROCHE_PICK:  [ 0.2,  -1.3000,  1.0000, -1.5000, -1.5700,  0.0000]
    PICK:           [ 0.2,  -1.4500,  1.1500, -1.7500, -1.5700,  0.0000]
    LIFT:           [ 0.2,  -1.2000,  1.0000, -1.5000, -1.5700,  0.0000]
    APPROCHE_PLACE: [-0.6,  -1.3000,  1.0000, -1.5000, -1.5700,  0.0000]
    PLACE:          [-0.6,  -1.4500,  1.1500, -1.7500, -1.5700,  0.0000]
    RETRAIT:        [-0.6,  -1.2000,  1.0000, -1.5000, -1.5700,  0.0000]
