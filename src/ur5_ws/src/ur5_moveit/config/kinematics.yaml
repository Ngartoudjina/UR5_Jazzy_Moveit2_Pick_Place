ur5_arm:
  # KDL : solveur numérique itératif par défaut.
  # Augmenter timeout et attempts améliore le taux de succès près des singularités.
  #
  # RECOMMANDATION PROFESSIONNELLE : remplacer par TRAC-IK pour ~40% de succès
  # en plus sur les poses difficiles :
  #   kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
  #   kinematics_solver_search_resolution: 0.005
  #   kinematics_solver_timeout: 0.05
  #   kinematics_solver_attempts: 3
  #   solve_type: Speed   # ou Distance / Manipulation1 / Manipulation2
  # Installation : apt install ros-humble-trac-ik-kinematics-plugin
  #
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  # timeout doublé (0.05 → 0.1) : KDL itère jusqu'à convergence.
  # 0.05s était trop court pour les poses proches des singularités du UR5
  # (configuration poignet singulier, coude étendu).
  kinematics_solver_timeout: 0.1
  # attempts doublés (5 → 10) : KDL redémarre depuis la seed à chaque tentative.
  # Plus de tentatives = plus de chances de trouver une solution non singulière.
  kinematics_solver_attempts: 10
