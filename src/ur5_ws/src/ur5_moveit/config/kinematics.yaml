ur5_arm:
  # CORRECTION #8 (audit) : timeout augmenté de 0.05s → 0.1s et attempts de 5 → 10.
  # KDL est un solveur numérique itératif — 50ms/5 tentatives était trop restrictif
  # pour les singularités du UR5 (poignet singulier, épaule singulière).
  #
  # RECOMMANDATION : remplacer KDL par TRAC-IK pour de meilleures performances :
  #   kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
  #   solve_type: Speed    # ou Distance / Manipulation1 / Manipulation2
  # (nécessite : apt install ros-jazzy-trac-ik-kinematics-plugin)
  #
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.1      # était 0.05 — doublé pour moins de timeouts
  kinematics_solver_attempts: 10      # était 5 — doublé pour les poses difficiles
