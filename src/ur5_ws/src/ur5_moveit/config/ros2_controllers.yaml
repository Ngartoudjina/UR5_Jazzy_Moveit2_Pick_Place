controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ur5_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    hand_controller:
      type: position_controllers/GripperActionController

joint_state_broadcaster:
  ros__parameters: {}

ur5_arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true
    constraints:
      stopped_velocity_tolerance: 0.01
      # goal_time : tolérance (secondes) entre le temps d'arrivée prévu et réel.
      # Avec mock_components (pas de physique réelle), le timing dépend du CPU.
      # 1.0s causait des GOAL_TOLERANCE_VIOLATED aléatoires sous charge.
      # 5.0s adapté à mock_components et à des trajectoires longues.
      goal_time: 5.0
      shoulder_pan_joint:  { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      elbow_joint:         { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint:       { trajectory: 0.2, goal: 0.1 }

hand_controller:
  ros__parameters:
    joint: robotiq_85_left_knuckle_joint
    action_monitor_rate: 20.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
