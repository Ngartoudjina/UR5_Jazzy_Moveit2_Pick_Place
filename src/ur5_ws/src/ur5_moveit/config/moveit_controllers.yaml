moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - ur5_arm_controller
    - hand_controller

  ur5_arm_controller:
    type: FollowJointTrajectory
    # action_ns doit correspondre exactement au namespace que JointTrajectoryController
    # expose. Pour ros2_control JTC, l'action est toujours follow_joint_trajectory.
    # Topic complet résultant : /ur5_arm_controller/follow_joint_trajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  hand_controller:
    type: GripperCommand
    # action_ns DOIT correspondre à la valeur exposée par GripperActionController.
    # ros2_control GripperActionController expose l'action sous le nom "gripper_cmd"
    # → topic complet : /hand_controller/gripper_cmd
    # CORRECTION : était "gripper_action" → le client Python ne trouvait jamais le serveur.
    action_ns: gripper_cmd
    default: true
    joints:
      - robotiq_85_left_knuckle_joint
