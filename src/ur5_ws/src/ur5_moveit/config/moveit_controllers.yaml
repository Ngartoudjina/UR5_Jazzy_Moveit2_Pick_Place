# moveit_controllers.yaml
# CORRECTION [BUG 1.1] : action_ns: gripper_action → gripper_cmd
#
# MoveItSimpleControllerManager construit le topic de l'action gripper en
# concaténant le nom du contrôleur et le champ action_ns :
#   → /hand_controller/<action_ns>
#
# GripperActionController (ros2_control) expose son action sur :
#   → /hand_controller/gripper_cmd
#
# L'ancienne valeur "gripper_action" donnait /hand_controller/gripper_action
# qui n'existe pas → has_gripper = False silencieux → saisie jamais réelle.

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - ur5_arm_controller
    - hand_controller

  ur5_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  hand_controller:
    type: GripperCommand
    action_ns: gripper_cmd   # [FIX 1.1] était: gripper_action
    default: true
    joints:
      - robotiq_85_left_knuckle_joint
